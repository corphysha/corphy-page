<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-label="Corphy favicon">
  <title>Corphy</title>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0a0e17" stroke="#ff6b35" stroke-width="2"/>
  <!-- Corphish body (simplified pixel-art style) -->
  <ellipse cx="32" cy="38" rx="14" ry="10" fill="#ff6b35"/>
  <!-- Claws -->
  <g fill="#ff8c5a">
    <rect x="14" y="28" width="6" height="10" rx="2" transform="rotate(-20 14 28)"/>
    <rect x="44" y="28" width="6" height="10" rx="2" transform="rotate(20 50 28)"/>
  </g>
  <!-- Eyes -->
  <circle cx="27" cy="34" r="3" fill="#fff"/>
  <circle cx="37" cy="34" r="3" fill="#fff"/>
  <circle cx="28" cy="34" r="1.5" fill="#0a0e17"/>
  <circle cx="38" cy="34" r="1.5" fill="#0a0e17"/>
  <!-- Star accents -->
  <text x="50" y="16" font-size="8" fill="#ffb347">★</text>
  <text x="8" y="20" font-size="6" fill="#00d4aa">✦</text>
  <text x="48" y="56" font-size="6" fill="#00d4aa">✦</text>
</svg>
